# Secret detection patterns for the NIS2 scanner.
#
# Each entry is compiled into a Python regex at scanner startup. Update
# this file to add, remove, or tune patterns — no code change required.
#
# Fields:
#   id          Unique snake_case identifier used in finding reports.
#   pattern     Python regex (re module syntax). Capture groups are allowed
#               but the full match (group 0) is always used for the preview.
#   description Human-readable description shown in the finding detail.
#   severity    critical | high | medium | low
#   flags       Optional list of Python re flag names: IGNORECASE, MULTILINE,
#               DOTALL. Default: none.
#   notes       Optional free-text field for maintainer comments (not exposed
#               in findings).
#
# Maintainer: to add a new pattern, append an entry and bump the
# version comment below. The scanner logs the pattern file path and entry
# count at startup so you can confirm the file was loaded.
#
# Pattern set version: 2.0 (2026-05-15)
# ---------------------------------------------------------------------------

patterns:

  # ---------------------------------------------------------------------------
  # AWS
  # ---------------------------------------------------------------------------
  - id: aws_access_key_id
    pattern: 'AKIA[0-9A-Z]{16}'
    description: "AWS IAM Access Key ID"
    severity: critical
    notes: "Prefix AKIA is stable. ASIA* are STS temporary credentials — lower risk but still indicative."

  - id: aws_sts_temp_key
    pattern: 'ASIA[0-9A-Z]{16}'
    description: "AWS STS Temporary Access Key (AssumeRole)"
    severity: high

  - id: aws_secret_access_key
    pattern: 'aws_secret_access_key\s*[=:]\s*["\x27]?([A-Za-z0-9/+=]{40})["\x27]?'
    description: "AWS Secret Access Key (config-file or env-var assignment)"
    severity: critical
    flags: [IGNORECASE]

  # ---------------------------------------------------------------------------
  # GitHub
  # ---------------------------------------------------------------------------
  - id: github_classic_pat
    pattern: 'ghp_[a-zA-Z0-9]{36}'
    description: "GitHub Classic Personal Access Token (ghp_)"
    severity: critical

  - id: github_fine_grained_pat
    pattern: 'github_pat_[a-zA-Z0-9_]{82}'
    description: "GitHub Fine-Grained Personal Access Token (github_pat_)"
    severity: critical
    notes: "Introduced 2022. Classic ghp_ tokens remain in use."

  - id: github_oauth_token
    pattern: 'gho_[a-zA-Z0-9]{36}'
    description: "GitHub OAuth Access Token (gho_)"
    severity: critical

  - id: github_app_installation_token
    pattern: 'ghs_[a-zA-Z0-9]{36}'
    description: "GitHub App Installation Token (ghs_)"
    severity: high

  - id: github_refresh_token
    pattern: 'ghr_[a-zA-Z0-9]{76}'
    description: "GitHub OAuth Refresh Token (ghr_)"
    severity: high

  # ---------------------------------------------------------------------------
  # GitLab
  # ---------------------------------------------------------------------------
  - id: gitlab_pat
    pattern: 'glpat-[a-zA-Z0-9_-]{20}'
    description: "GitLab Personal Access Token (glpat-)"
    severity: critical

  - id: gitlab_runner_token
    pattern: 'glrt-[a-zA-Z0-9_-]{20}'
    description: "GitLab Runner Authentication Token (glrt-)"
    severity: high

  # ---------------------------------------------------------------------------
  # OpenAI / Anthropic
  # ---------------------------------------------------------------------------
  - id: openai_api_key
    pattern: 'sk-[a-zA-Z0-9]{20}T3BlbkFJ[a-zA-Z0-9]{20}'
    description: "OpenAI API Key (legacy format)"
    severity: critical

  - id: openai_api_key_v2
    pattern: 'sk-proj-[a-zA-Z0-9_-]{86,}'
    description: "OpenAI Project API Key (sk-proj-)"
    severity: critical

  - id: anthropic_api_key
    pattern: 'sk-ant-[a-zA-Z0-9_-]{93,}'
    description: "Anthropic API Key (sk-ant-)"
    severity: critical

  # ---------------------------------------------------------------------------
  # Google
  # ---------------------------------------------------------------------------
  - id: google_api_key
    pattern: 'AIza[0-9A-Za-z_-]{35}'
    description: "Google API Key (AIza prefix)"
    severity: high

  - id: google_oauth_client_secret
    pattern: 'GOCSPX-[a-zA-Z0-9_-]{28}'
    description: "Google OAuth 2.0 Client Secret"
    severity: critical

  # ---------------------------------------------------------------------------
  # Slack
  # ---------------------------------------------------------------------------
  - id: slack_bot_token
    pattern: 'xoxb-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{24}'
    description: "Slack Bot User OAuth Token (xoxb-)"
    severity: critical

  - id: slack_user_token
    pattern: 'xoxp-[0-9]{10,13}-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{32}'
    description: "Slack User OAuth Token (xoxp-)"
    severity: critical

  - id: slack_app_token
    pattern: 'xapp-[0-9]-[A-Z0-9]{10,13}-[0-9]{13}-[a-zA-Z0-9]{64}'
    description: "Slack App-Level Token (xapp-)"
    severity: high

  - id: slack_webhook_url
    pattern: 'hooks\.slack\.com/services/T[a-zA-Z0-9_]{8,}/B[a-zA-Z0-9_]{8,}/[a-zA-Z0-9_]{24}'
    description: "Slack Incoming Webhook URL"
    severity: high

  # ---------------------------------------------------------------------------
  # Private keys / certificates
  # ---------------------------------------------------------------------------
  - id: private_key_pem
    pattern: '-----BEGIN (RSA |EC |DSA |OPENSSH |ENCRYPTED )?PRIVATE KEY-----'
    description: "PEM-encoded private key header"
    severity: critical

  # ---------------------------------------------------------------------------
  # Generic / catch-all
  # ---------------------------------------------------------------------------
  - id: generic_api_key
    pattern: 'api[_-]?key\s*[:=]\s*["\x27]?([a-zA-Z0-9_\-]{20,})["\x27]?'
    description: "Generic API key assignment (api_key = ...)"
    severity: medium
    flags: [IGNORECASE]
    notes: "High false-positive rate. Review findings before actioning."

  - id: jwt_token
    pattern: 'eyJ[a-zA-Z0-9_-]*\.eyJ[a-zA-Z0-9_-]*\.[a-zA-Z0-9_-]+'
    description: "JSON Web Token (base64url encoded header + payload + signature)"
    severity: medium
    notes: "May be legitimate in API responses. Check if it is a long-lived token."

  - id: bearer_token_header
    pattern: 'Authorization\s*:\s*Bearer\s+([a-zA-Z0-9_\-\.]{20,})'
    description: "HTTP Authorization Bearer token in response body"
    severity: high
    flags: [IGNORECASE]
