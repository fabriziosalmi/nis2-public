[alembic]
script_location = alembic
prepend_sys_path = .
# Fallback URL — overridden at runtime by env.py using
# settings.database_url (from .env / environment variables).
# The host-mapped port 5433 is for running alembic from the host;
# inside Docker, postgres:5432 resolves via Docker DNS.
sqlalchemy.url = postgresql+asyncpg://nis2:nis2secret@localhost:5433/nis2

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
