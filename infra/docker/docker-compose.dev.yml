services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nis2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nis2secret}
      POSTGRES_DB: ${POSTGRES_DB:-nis2}
    ports: ["5433:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nis2"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: packages/api/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ../../packages/api:/app/packages/api
      - ../../packages/scanner:/app/packages/scanner
    ports: ["8000:8000"]
    env_file: ../../.env
    environment:
      ENVIRONMENT: development
      # `uvicorn --reload` uses the `watchfiles` library, which relies on
      # inotify. inotify events do not propagate from a Windows-hosted
      # filesystem through WSL2's `/mnt/c` proxy, so without polling the
      # API simply never picks up Python edits. Same family as the
      # WATCHPACK_POLLING fix on the web service. Cheap on Linux hosts.
      WATCHFILES_FORCE_POLLING: "true"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      # /api/v1/health does not require auth (deliberately) and returns
      # 200 once lifespan setup (RLS, schema bootstrap) has completed —
      # the right gate for any downstream waiting on `service_healthy`.
      # Using python instead of wget/curl because the slim API image
      # ships neither but always has python; no extra layer needed.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=2).status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  celery-worker:
    build:
      context: ../..
      dockerfile: packages/api/Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ../../packages/api:/app/packages/api
      - ../../packages/scanner:/app/packages/scanner
    env_file: ../../.env
    environment:
      ENVIRONMENT: development
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  celery-beat:
    build:
      context: ../..
      dockerfile: packages/api/Dockerfile
    # The default beat scheduler is a SQLite-shelve file (`celerybeat-
    # schedule`) written to the working directory. The working dir is
    # `/app/packages/api`, which is bind-mounted from the host. On
    # Docker Desktop with WSL2 + a Windows-hosted source tree, file
    # locking semantics through the `/mnt/c` proxy do not satisfy
    # SQLite's POSIX-locking requirements, so beat crashes on first
    # write and exit-loops. `/tmp` lives on tmpfs *inside* the container
    # — fast, locking-correct, and isolated from the host filesystem.
    # On Linux hosts this is just a slightly faster path; on WSL2 it
    # is what makes celery-beat boot at all. (Reported by Davide F.)
    command: celery -A app.tasks.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    volumes:
      - ../../packages/api:/app/packages/api
    env_file: ../../.env
    environment:
      ENVIRONMENT: development
    depends_on:
      redis: { condition: service_healthy }

  web:
    build:
      context: ../../packages/web
      dockerfile: Dockerfile
      target: dev
    command: npm run dev
    volumes:
      - ../../packages/web:/app
      - /app/node_modules
      - /app/.next
    ports: ["8077:3000"]
    env_file: ../../.env
    environment:
      # Browser-side: where the user's browser reaches the API directly.
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      # Server-side: where the Next.js process inside this container
      # reaches the API for rewrites. `api` resolves via docker DNS.
      - INTERNAL_API_URL=http://api:8000
      # Windows/WSL2 file watcher fix. Native chokidar/inotify events
      # do not propagate from a Windows-mounted filesystem into WSL2,
      # which makes Next.js never finish its initial dev compile and
      # leaves the browser stuck on the SSR'd "Loading..." fallback.
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true

volumes:
  pgdata:
