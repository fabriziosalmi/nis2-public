services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      # service_healthy (not service_started) so Caddy doesn't proxy to
      # an API or web that's still warming up — the difference between
      # a clean start and a few minutes of intermittent 502s on cold
      # deploys. Pre-2.4.27 the web service was gated only on
      # service_started, which Docker considers green the moment the
      # container's ENTRYPOINT process is running, NOT once it's
      # accepting connections. Next.js standalone has a measurable
      # warm-up window where `node server.js` is alive but the listen
      # socket is not yet open — Caddy started proxying immediately and
      # the first user requests after a `make prod` got 502s for ~5–15
      # seconds. Now both upstreams must report healthy.
      api: { condition: service_healthy }
      web: { condition: service_healthy }
    restart: unless-stopped
    networks: [nis2-net]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nis2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-nis2}
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nis2"]
      interval: 5s
      retries: 5
    restart: unless-stopped
    networks: [nis2-net]

  redis:
    image: redis:7-alpine
    # `${VAR:-default}` (docker compose syntax): falls back to "changeme"
    # if .env is missing the key (e.g. user copied .env.example but forgot
    # to fill it). Without the default, an empty string is passed to
    # redis-server which then refuses to start with "ERR wrong number of
    # arguments for 'requirepass'", and the healthcheck never goes green.
    # Reported by Davide on `make prod` from Windows / WSL2.
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    environment:
      # Re-expose the password inside the container so the healthcheck
      # below can read it from $REDIS_PASSWORD instead of having compose
      # expand it at spec-build time. Two upsides:
      #   (a) the same compose file works whether `.env` has the var or not;
      #   (b) the password isn't baked into the rendered spec (visible via
      #       `docker inspect`), only into the container's env.
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
    healthcheck:
      # `$$` escapes one $ so docker compose passes literal `$REDIS_PASSWORD`
      # to the shell inside the container, which then expands it. The
      # `--no-auth-warning` silences the "WARNING: Using -a on the CLI"
      # banner that older redis-cli prints to stderr (still exit 0, but
      # noisy on `docker compose logs`).
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD --no-auth-warning ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks: [nis2-net]

  api:
    build:
      context: ../..
      dockerfile: packages/api/Dockerfile
    command: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    env_file: ../../.env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    networks: [nis2-net]
    # Caddy sits in front and proxies /api/* to this service; without a
    # healthcheck Caddy can race the API and serve 502s during the
    # 5–30s startup window (RLS bootstrap + schema sync).
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s

  celery-worker:
    build:
      context: ../..
      dockerfile: packages/api/Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    env_file: ../../.env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    networks: [nis2-net]
    # P2-07 audit fix: healthcheck for worker liveness. Without this,
    # a worker that dies silently (OOM, broker disconnect) leaves scans
    # in `pending` forever with no Docker-level signal. `celery inspect
    # ping` contacts the worker through the broker and fails if it
    # doesn't respond within timeout.
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping --timeout 5 2>/dev/null | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery-beat:
    build:
      context: ../..
      dockerfile: packages/api/Dockerfile
    # See the dev compose for context: the default beat scheduler writes
    # a SQLite-shelve file to the working directory, and that file
    # cannot survive a host bind-mount through WSL2's `/mnt/c` proxy.
    # In prod we don't have a bind-mount, but we still want the beat
    # schedule to survive container restarts so cron-style triggers
    # don't double-fire after a deploy — hence the named volume.
    command: celery -A app.tasks.celery_app beat --loglevel=info --schedule=/var/celerybeat/schedule
    volumes:
      - celerybeat_data:/var/celerybeat
    env_file: ../../.env
    depends_on:
      redis: { condition: service_healthy }
    restart: unless-stopped
    networks: [nis2-net]

  web:
    build:
      context: ../../packages/web
      dockerfile: Dockerfile
      target: production
    # The production stage builds Next.js as a *standalone* bundle: only
    # `.next/standalone/server.js`, `.next/static/` and `public/` are
    # copied into the final image — no `node_modules`, no `package.json`,
    # no `next` binary. The Dockerfile CMD is already `node server.js`.
    # The previous `command: npm start` invoked `next start`, which then
    # crashed with `sh: next: not found` and the container restart-looped
    # forever (reported by Davide on Docker Desktop / WSL2). Letting
    # the Dockerfile CMD run is the only correct option.
    env_file: ../../.env
    environment:
      # Browser-side: the public domain (in front of Caddy).
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://localhost}
      # Server-side: where the Next.js process inside this container
      # reaches the API for rewrites. Internal docker DNS, not the
      # public URL.
      - INTERNAL_API_URL=http://api:8000
    restart: unless-stopped
    networks: [nis2-net]
    # node:20-alpine doesn't ship curl/wget, but it always has node
    # itself. The Next.js standalone server returns 200 (or 307 redirect
    # to /login) on `/` once the listen socket is open — the right gate
    # for Caddy's `service_healthy` dependency above. start_period
    # covers the cold-build warm-up; interval/retries together give us
    # ~50s of grace before the container is marked unhealthy.
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ../../prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports: ["9099:9090"]
    restart: unless-stopped
    networks: [nis2-net]

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  prometheus_data:
  celerybeat_data:

networks:
  nis2-net:
    driver: bridge
