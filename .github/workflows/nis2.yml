name: NIS2 Compliance Scan

# WARNING: Do not run Nmap scans from public GitHub Runners.
# It violates GitHub's AUP. Use Self-Hosted Runners or a VPN.
# This workflow is configured for manual trigger only for safety.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install scanner package
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/scanner

      - name: Run scanner tests
        run: |
          cd packages/scanner && python -m pytest tests/ -v

      - name: Manual scan placeholder
        env:
          INTERNAL_API_CREDS: ${{ secrets.INTERNAL_API_CREDS }}
        run: |
          echo "Manual scan workflow. Run targeted scans via:"
          echo "  nis2scan --target example.com"
