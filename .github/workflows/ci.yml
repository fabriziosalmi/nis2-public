name: CI -- Full Stack

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # -----------------------------------------------------------------------
  # Scanner Engine Tests
  # -----------------------------------------------------------------------
  scanner-tests:
    name: Scanner Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/scanner
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest pytest-asyncio
      - name: Run scanner tests
        run: python -m pytest tests/ -v --tb=short

  # -----------------------------------------------------------------------
  # API Tests (no DB -- validation layer only)
  # -----------------------------------------------------------------------
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install -e packages/scanner 2>/dev/null || pip install -e packages/scanner
          pip install -e packages/api 2>/dev/null || pip install -e packages/api
          pip install pytest httpx slowapi
      - name: Run SSRF validator tests
        run: cd packages/api && python -m pytest tests/test_target_validator.py -v --tb=short

  # -----------------------------------------------------------------------
  # Web Build Check
  # -----------------------------------------------------------------------
  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  # -----------------------------------------------------------------------
  # Python Lint
  # -----------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: pip install ruff
      - name: Lint scanner
        run: ruff check packages/scanner/nis2scan/ --select=E,W,F --ignore=E501
      - name: Lint API
        run: ruff check packages/api/app/ --select=E,W,F --ignore=E501

  # -----------------------------------------------------------------------
  # Security Checks
  # -----------------------------------------------------------------------
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check no .env committed
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "ERROR: .env is tracked in git!"
            exit 1
          fi
          echo "OK: .env not in git"
      - name: Check no bare except
        run: |
          BARE=$(grep -rn "^[[:space:]]*except:$" --include="*.py" packages/ nis2_checker/ 2>/dev/null | wc -l)
          if [ "$BARE" -gt 0 ]; then
            grep -rn "^[[:space:]]*except:$" --include="*.py" packages/ nis2_checker/
            echo "ERROR: Found $BARE bare except: statements"
            exit 1
          fi
          echo "OK: No bare except: found"
      - name: Check CORS not wildcard
        run: |
          if grep -q 'allow_origins=\["\*"\]' packages/api/app/main.py; then
            echo "ERROR: CORS wildcard detected"
            exit 1
          fi
          echo "OK: CORS properly restricted"
