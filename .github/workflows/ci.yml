name: CI -- Full Stack

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  # Node 22 LTS (Active until 2027-10). Bumped from 20 because the
  # local lockfile is generated with npm 11 (Node 22+/25), and npm 10
  # (bundled with Node 20) reads it as out-of-sync — the tell-tale
  # symptom is `npm ci` failing with `Missing: @swc/helpers@x.y.z
  # from lock file` even though the entry exists. Aligning CI to a
  # Node version whose bundled npm matches the lockfile generator
  # avoids regenerating the lockfile every time someone bumps a dep
  # on a fresh machine.
  NODE_VERSION: "22"

jobs:
  # -----------------------------------------------------------------------
  # Scanner Engine Tests
  # -----------------------------------------------------------------------
  scanner-tests:
    name: Scanner Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/scanner
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest pytest-asyncio
      - name: Run scanner tests
        run: python -m pytest tests/ -v --tb=short

  # -----------------------------------------------------------------------
  # API Tests (no DB — unit tests only)
  # -----------------------------------------------------------------------
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    # Unit tests don't need real config; ENVIRONMENT=development relaxes
    # the boot-time JWT_SECRET / CORS_ORIGINS validation so app.main
    # imports cleanly during pytest collection.
    env:
      ENVIRONMENT: development
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install -e packages/scanner
          pip install -e packages/api
          pip install pytest pytest-asyncio httpx slowapi
      - name: Run API tests
        run: cd packages/api && python -m pytest tests/ -v --tb=short --ignore=tests/test_integration.py

  # -----------------------------------------------------------------------
  # Integration Tests — exercises RLS, refresh-token rotation, audit
  # log writes, CSRF enforcement against a real Postgres service.
  # -----------------------------------------------------------------------
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nis2
          POSTGRES_PASSWORD: nis2secret
          POSTGRES_DB: nis2_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nis2"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      ENVIRONMENT: production
      # The app connects as nis2_app (NOSUPERUSER NOBYPASSRLS) created
      # below. Postgres lets superusers bypass RLS unconditionally — even
      # FORCE ROW LEVEL SECURITY does not bind them — so we cannot connect
      # the app as the postgres bootstrap user (`nis2`) and meaningfully
      # exercise the failsafe.
      DATABASE_URL: postgresql+asyncpg://nis2_app:apppwd@localhost:5432/nis2_test
      DATABASE_URL_SYNC: postgresql://nis2_app:apppwd@localhost:5432/nis2_test
      JWT_SECRET: integration-test-secret-must-be-at-least-32-chars-long-yes
      CORS_ORIGINS: http://localhost:3000
      INTEGRATION_DB: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install -e packages/scanner
          pip install -e packages/api
          pip install pytest pytest-asyncio httpx slowapi
      - name: Provision non-superuser app role (RLS-bound)
        # Create a dedicated NOSUPERUSER NOBYPASSRLS role for the app to
        # connect as. The bootstrap-superuser `nis2` cannot be demoted
        # (Postgres refuses), so we provision a sibling role and grant it
        # the privileges it needs to own and manipulate the test schema.
        env:
          PGPASSWORD: nis2secret
        run: |
          psql -h localhost -U nis2 -d nis2_test <<'SQL'
          CREATE ROLE nis2_app WITH LOGIN PASSWORD 'apppwd' NOSUPERUSER NOBYPASSRLS;
          GRANT ALL ON SCHEMA public TO nis2_app;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO nis2_app;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO nis2_app;
          SQL
      - name: Run integration tests
        run: cd packages/api && python -m pytest tests/test_integration.py -v --tb=short

  # -----------------------------------------------------------------------
  # Web Build Check
  # -----------------------------------------------------------------------
  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  # -----------------------------------------------------------------------
  # Python Lint
  # -----------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: pip install ruff
      - name: Lint scanner
        run: ruff check packages/scanner/nis2scan/ --select=E,W,F --ignore=E501
      - name: Lint API
        run: ruff check packages/api/app/ --select=E,W,F --ignore=E501

  # -----------------------------------------------------------------------
  # Policy Checks (cheap repo-wide invariants)
  # -----------------------------------------------------------------------
  policy-checks:
    name: Policy Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: No .env committed
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "ERROR: .env is tracked in git!"
            exit 1
          fi
          echo "OK: .env not in git"
      - name: No bare except
        run: |
          if grep -rn "^[[:space:]]*except:$" --include="*.py" packages/ ; then
            echo "ERROR: bare except: statements found"
            exit 1
          fi
          echo "OK: No bare except: found"
      - name: No CORS wildcard
        run: |
          if grep -q 'allow_origins=\["\*"\]' packages/api/app/main.py; then
            echo "ERROR: CORS wildcard detected"
            exit 1
          fi
          echo "OK: CORS properly restricted"

  # -----------------------------------------------------------------------
  # Python dependency vulnerability scan
  # -----------------------------------------------------------------------
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install workspace and pip-audit
        run: |
          # Upgrade pip itself first — older pip in the runner image has
          # CVE-2026-3219, and pip-audit will flag it on the installed
          # environment otherwise.
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -e packages/scanner
          pip install -e packages/api
      - name: Audit installed Python dependencies
        # `--skip-editable` excludes our own monorepo packages (nis2scan,
        # nis2-api) which are installed via `pip install -e` and therefore
        # not published to PyPI. Without --strict, real vulnerabilities
        # still fail the job; missing-from-PyPI warnings do not.
        run: pip-audit --skip-editable

  # -----------------------------------------------------------------------
  # Web dependency vulnerability scan
  # -----------------------------------------------------------------------
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Audit (high+)
        run: npm audit --omit=dev --audit-level=high

  # -----------------------------------------------------------------------
  # Secret detection on full git history
  # -----------------------------------------------------------------------
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        run: |
          GITLEAKS_VERSION=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --no-banner --exit-code 1

  # -----------------------------------------------------------------------
  # Filesystem vulnerability + misconfiguration scan
  # -----------------------------------------------------------------------
  trivy-fs:
    name: trivy fs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run Trivy filesystem scan
        run: |
          # Bumped from 0.50.4 — that release was removed from GitHub
          # (asset 404). 0.70.0 keeps the same `trivy_VERSION_Linux-64bit`
          # naming, so the URL pattern is unchanged.
          TRIVY_VERSION=0.70.0
          curl -sSL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | tar -xz -C /tmp trivy
          /tmp/trivy fs --scanners vuln,secret,misconfig \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed \
            .
