# Minimal single-service compose for quick testing.
# For full stack (Postgres, Redis, Celery, Next.js), use:
#   make dev    (development)
#   make prod   (production with Caddy + Prometheus)

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - nis2-net

networks:
  nis2-net:
    driver: bridge
